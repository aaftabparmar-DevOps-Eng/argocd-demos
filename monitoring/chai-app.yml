apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: chai-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: 'https://github.com/aaftabparmar-DevOps-Eng/argocd-demos.git'
    targetRevision: main
    path: monitoring/chai-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
